#This is only an example. Most values are dummy placeholders just to match the
#types; they are often not optimal and must be tuned. 

[control]
version = 4
online = false

#The values retained from Mortal original repository are preserved as-is 
#and do not necessarily imply suitability for Mortal-Policy repository

state_file = '/path/to/mortal.pth'
best_state_file = '/path/to/best.pth'
tensorboard_dir = '/path/to/dir'

device = 'cuda:0'
enable_cudnn_benchmark = true
enable_amp = false
enable_compile = false
allow_tf32 = true
enable_cuda_prefetch = true

batch_size = 512
opt_step_every = 1

save_every = 400
test_every = 20000
submit_every = 400
old_update_every = 400

# using env `TRAIN_PLAY_PROFILE`
[train_play.default]
games = 800
log_dir = '/path/to/train_play'
repeats = 1
#Using values between 0.0 and 1.0 is unconventional and may harm results,
#but it could stabilize optimization if other hyperparameters are poorly configured.
explore_rate = 1.0


[test_play]
enable = false
games = 3000
log_dir = '/path/to/test_play'

[supervised]
state_file = '/path/to/stage0_5_latest.pth'
best_state_file = '/path/to/stage0_5_supervised.pth'
best_loss_state_file = '/path/to/stage0_5_supervised.pth'
best_acc_state_file = '/path/to/stage0_5_supervised_best_acc.pth'
best_rank_state_file = '/path/to/stage0_5_supervised_best_rank.pth'
init_state_file = '/path/to/optional_init_only_checkpoint.pth'
tensorboard_dir = '/path/to/tb_log_supervised_main'
file_index = '/path/to/file_index_supervised_json.pth'
batch_size = 1024
save_every = 2000
num_workers = 4
file_batch_size = 10
val_file_batch_size = 8
prefetch_factor = 3
val_prefetch_factor = 5
log_every = 1000
max_epochs = 99
max_steps = 30000
min_epochs = 2
val_every_steps = 20000
monitor_val_batches = 512
full_val_every_checks = 0
old_regression_every_checks = 0
force_safe_training = false
min_validation_checks = 2
early_stopping_patience = 8
early_stopping_patience_checks = 8
early_stopping_min_delta = 0.0005
early_stopping_min_lr_reductions = 2
val_ratio = 0.02
min_val_files = 64
max_train_files = 0
max_val_files = 0
seed = 20260308
enable_oracle = false

[supervised.scheduler]
type = 'plateau' # plateau | cosine
warm_up_steps = 5000
init = 1e-8
factor = 0.5
patience = 2
threshold = 0.0005
cooldown = 0
min_lr = 1e-6
final = 1e-5
max_steps = 0

[supervised.rank_aux]
base_weight = 0.03
south_factor = 1.59
all_last_factor = 1.617
gap_focus_points = 4000
gap_close_bonus = 0.0
max_weight = 0.10

[supervised.rank_aux.turn_weighting]
early_factor = 1.00
mid_factor = 1.05
late_factor = 1.15
early_max_turn = 4
late_min_turn = 12

[stage1]
state_file = '/path/to/stage1_latest_oracle.pth'
best_state_file = '/path/to/stage1_best_loss_oracle.pth'
best_loss_state_file = '/path/to/stage1_best_loss_oracle.pth'
best_acc_state_file = '/path/to/stage1_best_acc_oracle.pth'
best_rank_state_file = '/path/to/stage1_best_rank_oracle.pth'
best_loss_normal_state_file = '/path/to/stage1_best_loss_normal.pth'
best_acc_normal_state_file = '/path/to/stage1_best_acc_normal.pth'
best_rank_normal_state_file = '/path/to/stage1_best_rank_normal.pth'
publish_stage2_handoff = true
init_state_file = '/path/to/stage0_5_supervised_best_loss.pth'
tensorboard_dir = '/path/to/tb_log_stage1'
file_index = '/path/to/file_index_stage1_json.pth'
batch_size = 1024
save_every = 2000
num_workers = 4
file_batch_size = 10
val_file_batch_size = 8
prefetch_factor = 3
val_prefetch_factor = 5
log_every = 1000
max_epochs = 99
max_steps = 30000
min_epochs = 2
val_every_steps = 20000
monitor_val_batches = 512
full_val_every_checks = 0
old_regression_every_checks = 0
force_safe_training = false
min_validation_checks = 2
early_stopping_patience = 8
early_stopping_patience_checks = 8
early_stopping_min_delta = 0.0005
early_stopping_min_lr_reductions = 2
val_ratio = 0.02
min_val_files = 64
max_train_files = 0
max_val_files = 0
seed = 20260318
enable_oracle = true
validation_use_oracle = false

[stage1.scheduler]
type = 'cosine' # plateau | cosine
warm_up_steps = 5000
init = 1e-8
factor = 0.5
patience = 2
threshold = 0.0005
cooldown = 0
min_lr = 1e-6
final = 1e-5
max_steps = 30000

[stage1.rank_aux]
base_weight = 0.03
south_factor = 1.59
all_last_factor = 1.617
gap_focus_points = 4000
gap_close_bonus = 0.0
max_weight = 0.10

[stage1.rank_aux.turn_weighting]
early_factor = 1.00
mid_factor = 1.05
late_factor = 1.15
early_max_turn = 4
late_min_turn = 12

[stage1.aux]
next_rank_weight = 0.2
opponent_state_weight = 0.0
opponent_shanten_weight = 0.8506568408072642
opponent_tenpai_weight = 1.1493431591927359
danger_enabled = false
danger_weight = 0.0
danger_any_weight = 0.09042179466099699
danger_value_weight = 0.8180402859274302
danger_player_weight = 0.09153791941157279
danger_focal_gamma = 0.0
danger_ramp_steps = 0
danger_value_cap = 96000.0

[stage1.aux.opponent_turn_weighting]
early_factor = 0.20
mid_factor = 1.0
late_factor = 1.60
early_max_turn = 4
late_min_turn = 12

[stage1.aux.danger_turn_weighting]
early_factor = 0.05
mid_factor = 1.0
late_factor = 2.50
early_max_turn = 4
late_min_turn = 12

[stage1.oracle_dropout]
enabled = true
schedule = 'linear' # none | linear | cosine
gamma_start = 1.0
gamma_end = 0.0
hold_steps = 0
decay_steps = 20000

[dataset]
globs = ['/path/to/dataset_json/**/*.json']
file_index = '/path/to/file_index_json.pth'
file_batch_size = 15
reserve_ratio = 0.0
num_workers = 6
prefetch_factor = 4
player_names_files = []
num_epochs = 1
enable_augmentation = false
augmented_first = false

#Current local mainline encoder default is b40c192 with GroupNorm.
#This example keeps placeholder paths, but the architecture should match the
#current repository default unless an experiment explicitly overrides it.
[resnet]
conv_channels = 192
num_blocks = 40

[env]
pts = [6.0, 4.0, 2.0, 0.0]

## These hyperparameters are merely the default values and do not imply that they are optimal.
[policy]
awr_beta = 1.0
awr_clip = 100
entropy_weight = 1e-3
clip_ratio = 0.2
dual_clip  = 3.0

[aux]
next_rank_weight = 0.2
opponent_state_weight = 0.0
opponent_shanten_weight = 0.8506568408072642
opponent_tenpai_weight = 1.1493431591927359
danger_enabled = false
danger_weight = 0.0
danger_any_weight = 0.09042179466099699
danger_value_weight = 0.8180402859274302
danger_player_weight = 0.09153791941157279
danger_focal_gamma = 0.0
danger_ramp_steps = 0
danger_value_cap = 96000.0

[aux.opponent_turn_weighting]
early_factor = 0.20
mid_factor = 1.0
late_factor = 1.60
early_max_turn = 4
late_min_turn = 12

[aux.danger_turn_weighting]
early_factor = 0.05
mid_factor = 1.0
late_factor = 2.50
early_max_turn = 4
late_min_turn = 12

[oracle]
enable = true
init_state_file = '/path/to/stage0_5_supervised.pth'
gamma_start = 1.0
gamma_end = 0.0
beta_warmup = 0.01
beta_final = 1.0
phase_a_steps = 50000
phase_b_steps = 300000
phase_c_steps = 400000

[optim]
eps = 1e-8
betas = [0.9, 0.999]
weight_decay = 0.1
max_grad_norm = 0

[optim.scheduler]
peak = 1e-4
final = 1e-4
warm_up_steps = 0
max_steps = 0

[baseline.train]
device = 'cuda:0'
enable_compile = false
state_file = '/path/to/baseline.pth'

[baseline.test]
device = 'cuda:0'
enable_compile = false
state_file = '/path/to/baseline.pth'

[online]
history_window = 50
enable_compile = false

[online.remote]
host = '127.0.0.1'
port = 5000

[online.server]
buffer_dir = '/path/to/buffer'
drain_dir = '/path/to/drain'
sample_reuse_rate = 0
sample_reuse_threshold = 0
capacity = 1600
force_sequential = false

[1v3]
seed_key = -1
games_per_iter = 2000
# Optional: set seed_count directly instead of games_per_iter / 4.
# seed_count = 500
# Optional: split a single 1v3 iteration across multiple local shard workers.
# shard_count = 2
# Optional: execution backend. Keep `process` as the default operating mode.
# `broker` is available for explicit experiments on a single local CUDA device,
# but it is not the default path.
# execution_mode = 'process'
# broker_batch_window_ms = 0.0
# broker_shard_count = 3
iters = 500
log_dir = '/path/to/1v3'

# Optional per-machine / per-GPU overrides. `one_vs_three.py` resolves in this order:
#   MORTAL_1V3_SEED_COUNT env
#   [1v3.machine_overrides.<COMPUTERNAME>]
#   [1v3.gpu_overrides."<GPU name>"]
#   built-in local GPU defaults
#   [1v3].seed_count or [1v3].games_per_iter
#
# Current built-in GPU defaults verified on 2026-04-02:
#   RTX 5070 Ti -> seed_count = 1024, shard_count = 4
#   RTX 4060 Laptop GPU -> seed_count = 640, shard_count = 3
# Current broker-specific built-in shard default verified on 2026-04-03:
#   RTX 5070 Ti -> broker_shard_count = 3
#
# [1v3.machine_overrides.YOUR_HOSTNAME]
# seed_count = 1024
# shard_count = 4
#
# [1v3.gpu_overrides."NVIDIA GeForce RTX 4060 Laptop GPU"]
# seed_count = 640
# shard_count = 3

[1v3.challenger]
device = 'cuda:0'
name = 'mortal'
state_file = '/path/to/challenger.pth'
stochastic_latent = false
enable_compile = false
enable_amp = true
enable_rule_based_agari_guard = true

[1v3.champion]
device = 'cuda:0'
name = 'baseline'
state_file = '/path/to/baseline.pth'
stochastic_latent = false
enable_compile = false
enable_amp = true
enable_rule_based_agari_guard = true

[grp]
state_file = '/path/to/grp.pth'
latest_state_file = '/path/to/grp_latest.pth'
best_loss_state_file = '/path/to/grp.pth'
best_acc_state_file = '/path/to/grp_best_acc.pth'

[grp.network]
hidden_size = 384
num_layers = 3
dtype = 'float32'

[grp.control]
device = 'cuda:0'
enable_cudnn_benchmark = true
allow_tf32 = false
tensorboard_dir = 'grp_v2/log'

batch_size = 1024
save_every = 2000
val_steps = 0
max_epochs = 30
min_epochs = 8
early_stopping_patience = 8
early_stopping_min_delta = 0.0005
early_stopping_min_lr_reductions = 2

[grp.dataset]
train_globs = [
    '/path/to/dataset/2019/**/*.json.gz',
    '/path/to/dataset/2020/**/*.json.gz',
    '/path/to/dataset/2021/01/**/*.json.gz',
    '/path/to/dataset/2021/02/**/*.json.gz',
    # ...
]
val_globs = [
    '/path/to/dataset/2021/10/**/*.json.gz',
    '/path/to/dataset/2021/11/**/*.json.gz',
    # ...
]
file_index = '/path/to/grp_file_index.pth'
file_batch_size = 50
num_workers = 10
prefetch_factor = 4

[grp.optim]
lr = 2e-5

[grp.optim.scheduler]
factor = 0.5
patience = 2
threshold = 0.0005
cooldown = 1
min_lr = 1e-6
